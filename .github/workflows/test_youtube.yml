name: 🎬 Test YouTube Nuclear Upload
on: 
  push:
    paths:
      - '.github/workflows/test_youtube.yml'
  workflow_dispatch:
jobs:
  test-yt-nuclear:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🛠️ Install dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 🎥 Download & Process Egypt Goal
        run: |
          yt-dlp "ytsearch1:هدف مصر والمغرب" -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "/tmp/egypt_goal.mp4"
          python3 video_processor.py /tmp/egypt_goal.mp4 /tmp/egypt_processed_nuclear.mp4 "مصر والمغرب"

      - name: 🚀 Upload to YT
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python3 -c "
          import os, sys, traceback
          from youtube_uploader import upload_to_youtube_shorts

          output_video = '/tmp/egypt_processed_nuclear.mp4'
          title = 'اختبار الفلتر النووي ☢️: هدف مصري'
          desc = f'{title}\n\n#كأس_العالم #مصر #كرة_القدم'

          try:
              upload_to_youtube_shorts(output_video, title[:90] + ' #shorts', desc, ['كرة_القدم', 'مصر', 'يلا_شوت'])
              print('✅ YT Nuclear success')
          except Exception as e:
              print('❌ YT failed:', traceback.format_exc())
          "
