name: 🎬 Simulate Match Highlight
on: workflow_dispatch
jobs:
  simulate-highlight:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🛠️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests Pillow google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client arabic-reshaper python-bidi
          
      - name: 🎥 Generate Test Video
        run: ffmpeg -f lavfi -i color=c=blue:s=1080x1920:d=10 -c:v libx264 -t 10 /tmp/test_vid.mp4

      - name: 🚀 Process and Upload
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
        run: |
          python3 -c "
          import os, sys, traceback
          from upload_match_highlights import send_video_to_telegram
          from youtube_uploader import upload_to_youtube_shorts
          from social_bot import post_fb_video
          
          output_video = '/tmp/test_vid.mp4'
          title = 'هدف خرافي 🤯 إسبانيا والأرجنتين كأس العالم'
          desc = f'{title}\n\n#كأس_العالم #اسبانيا #الارجنتين #كرة_القدم'
          
          with open('run_log.txt', 'w') as f:
              f.write('STARTING UPLOAD TEST\n')
              
              f.write('\n--- Telegram ---\n')
              try:
                  send_video_to_telegram(os.getenv('TELEGRAM_BOT_TOKEN'), os.getenv('TELEGRAM_CHANNEL_ID'), output_video, desc)
                  f.write('✅ Telegram success\n')
              except Exception as e:
                  f.write(f'❌ Telegram failed: {traceback.format_exc()}\n')
              
              f.write('\n--- Facebook ---\n')
              try:
                  post_fb_video(desc, output_video)
                  f.write('✅ FB success\n')
              except Exception as e:
                  f.write(f'❌ FB failed: {traceback.format_exc()}\n')
              
              f.write('\n--- YouTube ---\n')
              try:
                  upload_to_youtube_shorts(output_video, title[:90] + ' #shorts', desc, ['كرة_القدم'])
                  f.write('✅ YT success\n')
              except Exception as e:
                  f.write(f'❌ YT failed: {traceback.format_exc()}\n')
          "
          cat run_log.txt
          
      - name: 📝 Create Issue on Failure
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --title "Test Video Upload Log" --body-file run_log.txt --repo mmossad824-sudo/Sports-bot || echo "Failed to create issue"
