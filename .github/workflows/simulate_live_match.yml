name: 🎬 Simulate Match Highlight
on: workflow_dispatch

jobs:
  simulate-highlight:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🛠️ Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 📚 Install Python packages
        run: |
          pip install requests Pillow google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client arabic-reshaper python-bidi
          
      - name: 🎥 Download Original Highlight
        run: |
          curl -L "https://h.uguu.se/WkPZpAKo.mp4" -o /tmp/spain_argentina_goal.mp4

      - name: 🚀 Process and Upload to all platforms
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
        run: |
          python3 -c "
          import os, sys
          from video_processor import process_video_for_shorts
          from upload_video_to_telegram import send_video_to_telegram
          from youtube_uploader import upload_to_youtube_shorts
          from social_bot import post_fb_video
          
          input_video = '/tmp/spain_argentina_goal.mp4'
          output_video = '/tmp/spain_argentina_processed.mp4'
          title = 'هدف خرافي 🤯 إسبانيا والأرجنتين كأس العالم 2026'
          desc = f'{title}\n\n#كأس_العالم #اسبانيا #الارجنتين #كرة_القدم #يلا_شوت'
          
          print('1. جاري معالجة الفيديو للتهرب من حقوق النشر والتحويل للوضع العمودي...')
          success = process_video_for_shorts(input_video, output_video, title, max_duration_sec=58)
          
          if not success:
              print('❌ فشل معالجة الفيديو')
              sys.exit(1)
              
          print('\n2. الرفع إلى تليجرام...')
          send_video_to_telegram(
              bot_token=os.getenv('TELEGRAM_BOT_TOKEN'),
              chat_id=os.getenv('TELEGRAM_CHANNEL_ID'),
              video_path=output_video,
              caption=desc
          )
          print('✅ تم الرفع لتليجرام')
          
          print('\n3. الرفع إلى فيسبوك ريلز...')
          fb_desc = f'{desc}\n\n📺 شاهد المباريات مباشرة: {os.getenv(\"WEBSITE_URL\")}'
          post_fb_video(fb_desc, output_video)
          print('✅ تم الرفع لفيسبوك ريلز')
          
          print('\n4. الرفع إلى YouTube Shorts...')
          upload_to_youtube_shorts(
              video_path=output_video,
              title=title[:90] + ' #shorts',
              description=fb_desc,
              tags=['كرة_القدم', 'ملخص', 'اهداف', 'كأس_العالم', 'اسبانيا', 'الارجنتين']
          )
          print('✅ تم الرفع ليوتيوب')
          "
