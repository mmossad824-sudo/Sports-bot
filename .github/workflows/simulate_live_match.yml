name: 🎬 Simulate Match Highlight
on: workflow_dispatch
jobs:
  simulate-highlight:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🛠️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests Pillow google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client arabic-reshaper python-bidi
          
      - name: 🎥 Generate Test Video
        run: |
          pip install yt-dlp
          yt-dlp "ytsearch1:short football goal highlight" --max-downloads 1 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --download-sections "*00:00:00-00:00:20" -o /tmp/raw_vid.mp4 || true
          if [ -f /tmp/raw_vid.mp4 ]; then
            python3 video_processor.py /tmp/raw_vid.mp4 /tmp/test_vid.mp4 "Test Match: Real Madrid VS Bayern" || cp /tmp/raw_vid.mp4 /tmp/test_vid.mp4
          else
            ffmpeg -f lavfi -i color=c=blue:s=1080x1920:d=10 -c:v libx264 -t 10 /tmp/test_vid.mp4
          fi

      - name: 🚀 Process and Upload
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
        run: |
          python3 -c "
          import os, sys, traceback, requests
          from social_bot import post_fb_video
          
          output_video = '/tmp/test_vid.mp4'
          title = 'هدف عالمي 🤯 إسبانيا ضد الأرجنتين في كأس العالم'
          desc = (
              f'{title}\n\n'
              '🔥 مشاهدة ممتعة للهدف الخرافي!\n\n'
              '🔴 لمتابعة البث المباشر وباقي الأهداف، زوروا موقعنا:\n'
              '🌐 https://yalla-shoot-today.vercel.app\n\n'
              '📱 تابع التغطية لحظة بلحظة على تليجرام:\n'
              '👉 https://t.me/yalla_shoot_today_Group\n\n'
              '📺 اشترك في قناتنا على يوتيوب:\n'
              '👉 https://youtube.com/@YourChannel\n\n'
              '🎵 تابعنا على تيك توك:\n'
              '👉 https://tiktok.com/@YourTikTok\n\n'
              '#كأس_العالم #اسبانيا #الارجنتين #كرة_القدم #يلا_شوت'
          )
          
          with open('run_log.txt', 'w') as f:
              f.write('STARTING UPLOAD TEST\n')
              
              f.write('\n--- Telegram ---\n')
              try:
                  bot_token = os.getenv('TELEGRAM_BOT_TOKEN')
                  chat_id = os.getenv('TELEGRAM_CHANNEL_ID')
                  url = f'https://api.telegram.org/bot{bot_token}/sendVideo'
                  with open(output_video, 'rb') as video_file:
                      r = requests.post(url, data={'chat_id': chat_id, 'caption': desc}, files={'video': video_file}, timeout=60)
                  if r.status_code == 200:
                      f.write('✅ Telegram success\n')
                  else:
                      f.write(f'❌ Telegram failed: {r.status_code} {r.text}\n')
              except Exception as e:
                  f.write(f'❌ Telegram failed: {traceback.format_exc()}\n')
              
              f.write('\n--- Facebook ---\n')
              try:
                  post_fb_video(desc, output_video)
                  f.write('✅ FB success\n')
              except Exception as e:
                  f.write(f'❌ FB failed: {traceback.format_exc()}\n')
              
              f.write('\n--- YouTube ---\n')
              try:
                  from youtube_uploader import upload_video
                  upload_video(output_video, title[:90] + ' #shorts', desc, ['كرة_القدم'])
                  f.write('✅ YT success\n')
              except Exception as e:
                  f.write(f'❌ YT failed: {traceback.format_exc()}\n')
          "
          cat run_log.txt
          
      - name: 📝 Create Issue on Failure
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --title "Test Video Upload Log" --body-file run_log.txt --repo mmossad824-sudo/Sports-bot || echo "Failed to create issue"
